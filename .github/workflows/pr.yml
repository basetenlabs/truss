name: PR - pre-commit

on:
  workflow_dispatch: # Allows running from actions tab
  pull_request:

concurrency:
  group: pr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: ./.github/actions/setup-python/
      - run: uv sync
      - name: pre-commit
        run: uv run pre-commit run --all-files
        env:
          SKIP: ruff,ruff-format # In CI run ruff separately to only check, not fix.
      - name: ruff check
        run: |
          uv run ruff check .
          uv run ruff format . --check

  determine-python-versions:
    runs-on: ubuntu-22.04
    outputs:
      min_supported_python_version: ${{ steps.extract.outputs.min_supported_python_version }}
      max_supported_python_version: ${{ steps.extract.outputs.max_supported_python_version }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies for version extraction
        run: pip install tomlkit packaging
      - name: Extract Python Version Range
        id: extract
        run: python .github/scripts/get-python-version-range.py

  test:
    timeout-minutes: 30
    needs: determine-python-versions
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        python_version: ["${{ needs.determine-python-versions.outputs.max_supported_python_version }}"]
        include:
          - os: ubuntu-22.04
            python_version: "${{ needs.determine-python-versions.outputs.min_supported_python_version }}"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: ./.github/actions/setup-python/
        with:
          python-version: ${{ matrix.python_version }}
      - name: Create test directories (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo mkdir -p /bptr && sudo chown $(whoami):$(whoami) /bptr
          sudo mkdir -p /static-bptr && sudo chown $(whoami):$(whoami) /static-bptr
          sudo mkdir -p /cache && sudo chown $(whoami):$(whoami) /cache
      - run: uv sync
      - name: run tests
        run: uv run pytest --durations=0  -m 'not integration' --junitxml=report.xml --basetemp=$RUNNER_TEMP/pytest-temp
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          report_paths: "report.xml"

  markdown-link-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@master
      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-verbose-mode: "yes"
          folder-path: "docs"
          config-file: ".mlc_config.json"
