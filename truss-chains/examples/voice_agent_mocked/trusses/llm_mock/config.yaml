model_name: voice_agent_mocked__llm_mock
description: |
  Voice-agent showcase: real vLLM CPU server with --load-format dummy
  (random weights). Serves OpenAI-compatible /v1/chat/completions so the
  entrypoint's `call_llm` can use a stock OpenAI client. Returns garbage
  tokens by design; the entrypoint maps the prompt to a legible response
  via a deterministic lookup after proving the wire is live.
base_image:
  image: public.ecr.aws/q9t5s3a7/vllm-cpu-release-repo:v0.21.0
docker_server:
  start_command: >-
    python3 -m vllm.entrypoints.openai.api_server
    --model EleutherAI/pythia-14m
    --load-format dummy
    --max-model-len 512
    --max-num-seqs 4
    --gpu-memory-utilization 0.1
    --host 0.0.0.0
    --port 8000
  predict_endpoint: /v1/chat/completions
  server_port: 8000
  readiness_endpoint: /health
  liveness_endpoint: /health
resources:
  cpu: "2"
  memory: 6Gi
  use_gpu: false
runtime:
  predict_concurrency: 4
