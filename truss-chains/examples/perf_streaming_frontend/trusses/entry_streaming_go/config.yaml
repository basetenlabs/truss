model_name: perf_streaming_frontend__entry_go
description: |
  Streaming front-end showcase entrypoint, written in Go. Accepts a
  newline-delimited FRAME audio buffer over WS. Per completed frame,
  fans out to TranscriberMock for incremental text; on disconnect / DONE,
  fans out to DiarizerMock for full-buffer RTTM, then to AssignerMock
  (Rust) for the final speaker-attributed transcript. Sibling URLs come
  from the platform's CHAINLET_SERVICE_DESCRIPTOR env var (no SDK in Go).
base_image:
  image: ghcr.io/mattelim/streaming-go:0.1.2
docker_server:
  start_command: /app/entry
  predict_endpoint: /stream/v1
  server_port: 8000
  readiness_endpoint: /health
  liveness_endpoint: /health
resources:
  cpu: "1"
  memory: 512Mi
  use_gpu: false
runtime:
  predict_concurrency: 4
  transport:
    kind: websocket
