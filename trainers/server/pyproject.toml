[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[project]
name = "trainers-server"
version = "0.1.0"
description = "Training worker server for the trainers SDK"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "pydantic>=2",
    "httpx",
    "uvicorn",
]

[project.optional-dependencies]
worker = [
    "ms-swift",
    "megatron-core",
    "torch",
    "vllm>=0.9",
]

[tool.uv]
override-dependencies = [
    "vllm>=0.12.0; sys_platform == 'linux'",
]

[tool.uv.sources]
ms-swift = { path = "vendor/ms-swift" }
megatron-core = { path = "vendor/megatron-lm" }
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
triton = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[dependency-groups]
dev = [
    "pytest>=9.0.3",
    "tinker>=0.13.1,<0.14",
]
