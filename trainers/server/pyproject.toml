[build-system]
requires = ["uv_build>=0.10.2,<0.11.0"]
build-backend = "uv_build"

[project]
name = "trainers-server"
version = "0.1.0"
description = "Training worker server for the trainers SDK"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "pydantic>=2",
    "httpx",
    "uvicorn",
]

[project.optional-dependencies]
worker = [
    "megatron-bridge",
    "transformers",
    "torch",
    "vllm>=0.9",
]

[tool.uv]
# transformer-engine must match the commit pinned by megatron-bridge; override-dependencies
# from path-deps are ignored by uv, so we forward it here explicitly.
override-dependencies = [
    "vllm>=0.12.0; sys_platform == 'linux'",
    "transformer-engine @ git+https://github.com/NVIDIA/TransformerEngine.git@71bbefbf153418f943640df0f7373625dc93fa46",
]
no-build-isolation-package = ["transformer-engine"]

[tool.uv.extra-build-dependencies]
transformer-engine = ["setuptools", "wheel", "pybind11", "torch"]

[tool.uv.sources]
megatron-bridge = { path = "vendor/megatron-bridge" }
torch = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]
triton = [
    { index = "pytorch-cu128", marker = "sys_platform == 'linux' or sys_platform == 'win32'" },
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true
